<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscrição confirmada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="container status-page">
    <div class="status-box">
      <div class="status-icon success" id="status-icon">✓</div>
      <h1 id="status-title">Inscrição confirmada!</h1>
      <p id="status-message">
        Seu pagamento foi aprovado e sua inscrição está garantida.
        Em instantes você deve receber a confirmação.
      </p>
      <p class="text-muted mb-3" style="font-size:13px" id="status-sub">
        Caso pague com PIX, a confirmação pode levar alguns minutos.
        Se algo der errado, fale com o organizador.
      </p>
      <div id="status-meta" class="text-muted text-sm mb-3" style="font-family:ui-monospace,Menlo,monospace"></div>
      <a href="index.html" class="btn btn-primary btn-block">Voltar ao início</a>
    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script>
    (function () {
      "use strict";
      const params = new URLSearchParams(location.search);
      const regId = params.get("registrationId") || params.get("reg") || "";
      const metaEl = document.getElementById("status-meta");
      const titleEl = document.getElementById("status-title");
      const msgEl = document.getElementById("status-message");
      const subEl = document.getElementById("status-sub");
      const iconEl = document.getElementById("status-icon");

      if (regId) {
        metaEl.textContent = "ID da inscrição: " + regId;
      }

      const { db } = window.__FB || {};
      if (!db || !regId) return;

      let tries = 0;
      const maxTries = 8; // ~24s
      function check() {
        tries++;
        db.collection("registrations").doc(regId).get().then(snap => {
          if (!snap.exists) return;
          const st = (snap.data().statusPagamento || "").toLowerCase();
          if (st === "pago") {
            iconEl.textContent = "✓";
            iconEl.className = "status-icon success";
            titleEl.textContent = "Pagamento aprovado!";
            msgEl.textContent = "Sua inscrição foi confirmada com sucesso.";
            subEl.textContent = "Guarde o ID acima caso precise falar com o organizador.";
            return;
          }
          if (st === "pendente" && tries < maxTries) {
            setTimeout(check, 3000);
          } else if (st === "pendente") {
            titleEl.textContent = "Aguardando confirmação";
            msgEl.textContent = "O Mercado Pago ainda está processando. Em alguns minutos sua inscrição será confirmada automaticamente.";
          } else if (st === "recusado" || st === "cancelado") {
            iconEl.textContent = "✕";
            iconEl.className = "status-icon error";
            titleEl.textContent = "Pagamento não concluído";
            msgEl.textContent = "Algo deu errado com o pagamento. Tente novamente.";
            subEl.textContent = "";
          }
        }).catch(() => {});
      }
      check();
    })();
  </script>
</body>
</html>
