<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Movidas pelo Espírito — redirecionando</title>
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="0; url=/mulheres">
<link rel="canonical" href="/mulheres">
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:#fbf5f1;color:#5b1830;display:grid;place-items:center;min-height:100vh;}
  .box{text-align:center;padding:24px;}
  .spinner{width:36px;height:36px;border:3px solid #f4dadc;border-top-color:#b8456e;border-radius:50%;margin:0 auto 14px;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  a{color:#8b2d52;}
</style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Redirecionando para a inscrição…</p>
    <p style="font-size:13px;color:#8a6772">Se nada acontecer, <a href="/mulheres">clique aqui</a>.</p>
  </div>
  <script>location.replace("/mulheres");</script>
</body>
</html>
