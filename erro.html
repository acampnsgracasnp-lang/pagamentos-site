<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento não concluído</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container status-page">
    <div class="status-box">
      <div class="status-icon error">✕</div>
      <h1>Pagamento não concluído</h1>
      <p>
        Não foi possível concluir o pagamento. Isso pode acontecer por
        recusa do cartão, expiração da sessão ou cancelamento manual.
      </p>
      <p class="text-muted mb-3" style="font-size:13px">
        Você pode tentar novamente sem problema — sua inscrição só será
        confirmada após o pagamento ser aprovado.
      </p>
      <a href="index.html" class="btn btn-primary btn-block">Tentar novamente</a>
    </div>
  </div>
</body>
</html>
