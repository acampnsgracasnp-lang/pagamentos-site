<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento não concluído</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container status-page">
    <div class="status-box">
      <div class="status-icon error">✕</div>
      <h1>Pagamento não concluído</h1>
      <p>
        Não foi possível concluir o pagamento. Isso pode acontecer por
        recusa do cartão, expiração da sessão ou cancelamento manual.
      </p>
      <p class="text-muted mb-3" style="font-size:13px">
        Você pode tentar novamente sem problema — sua inscrição só será
        confirmada após o pagamento ser aprovado.
      </p>
      <div id="status-meta" class="text-muted text-sm mb-3" style="font-family:ui-monospace,Menlo,monospace"></div>
      <a href="index.html" class="btn btn-primary btn-block">Tentar novamente</a>
    </div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const regId = params.get("registrationId") || params.get("reg") || "";
      if (regId) {
        document.getElementById("status-meta").textContent = "ID da inscrição: " + regId;
      }
    })();
  </script>
</body>
</html>
